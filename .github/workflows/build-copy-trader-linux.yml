name: Build Copy Trader Linux

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_DIR: rust-solana-gemini-main/rust-solana--gemini/solana-copy-trader

jobs:
  build-linux:
    name: Build Linux Artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.PROJECT_DIR }}

      - name: Build release binary
        run: cargo build --locked --release --bin copy-trader

      - name: Upload Linux binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: copy-trader-linux
          path: ${{ env.PROJECT_DIR }}/target/release/copy-trader
          if-no-files-found: error
          retention-days: 7
